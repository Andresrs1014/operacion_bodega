services:

  db:
    image: postgres:16-alpine
    container_name: brakepak_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-brakepak}
      POSTGRES_USER:     ${POSTGRES_USER:-brakepak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brakepak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brakepak_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brakepak_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brakepak}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-brakepak}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brakepak_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brakepak_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - brakepak_net

volumes:
  postgres_data:

networks:
  brakepak_net:
    driver: bridge
